name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: clojure -M:datomic:test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache m2 / gitlibs
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-jdk${{ matrix.java }}-clj-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-jdk${{ matrix.java }}-clj-

      - name: Run tests
        # sip.store-test needs a real datalevin store (its own docstring says
        # "Run with clojure -M:datomic:test") -- bare -M:test can't load it.
        # sip.render-test is excluded: it reads 2 EDN files out of the private
        # com-junkawasaki/org-spirit-in-physics-comics story-bible repo (a
        # different, private org), which the default GITHUB_TOKEN can't check
        # out cross-org (confirmed: "Not Found" even via sparse-checkout).
        # Needs a PAT with cross-org read access added as a repo secret to
        # cover in CI; verify sip.render-test locally in the meantime (it
        # passes with the sibling checked out at ../../com-junkawasaki/
        # org-spirit-in-physics-comics or SIP_IP_ROOT pointed at it).
        run: clojure -M:datomic:test -r 'sip\.(?!render).*-test$'

      - name: Lint (clj-kondo)
        run: clojure -M:lint
